services:
  db:
    image: postgres:15.17-alpine3.23
    container_name: resumeai-db
    environment:
      POSTGRES_DB: resumeai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
